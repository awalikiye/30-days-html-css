<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name= "viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing table</title>
    <link rel="stylesheet" href="style4.css">
    </head>
    <body>
            <h1>Our Pricing Plans</h1>
            <div class="pricing-container">
                <div class="pricing-card">
                    <h2>Basic</h2>
                    <h3>$10/month</h3>
                    <ul>
                        <li>5 Project</li>
                        <li>10GB Storage</li>
                        <li>Email Support</li>
                    </ul>
                    <button>Choose Plan</button>
            </div>
        
                <div class="pricing-card">
                    <h2>Pro</h2>
                    <h3>$20/month</h3>
                    <ul>
                        <li>20 Project</li>
                        <li>50GB Storage</li>
                        <li>Priority Support</li>
                    </ul>
                    <button>Choose Plan</button>
            </div>
            <div class="pricing-card">
                    <h2>Premium</h2>
                    <h3>$39/month</h3>
                    <ul>
                        <li>Unlimited Project</li>
                        <li>500GB Storage</li>
                        <li>24/7 Support</li>
                    </ul>
                    <button>Choose Plan</button>
            </div>
    </body>
</html>
